name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_note:
        description: '更新说明'
        required: false
        default: '功能更新与Bug修复'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get version name
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: Build arm64 Release APK
        run: |
          ./gradlew assembleArm64Release \
            --build-cache --parallel --daemon \
            --warning-mode all \
            -Pandroid.injected.signing.store.file="" 2>&1

      - name: Build armeabi Release APK
        run: |
          ./gradlew assembleArmeabiRelease \
            --build-cache --parallel --daemon \
            --warning-mode all 2>&1

      - name: Collect APKs
        run: |
          mkdir -p ${{ github.workspace }}/apk
          find . -name "*.apk" -not -path "*/intermediates/*" | while read f; do
            filename=$(basename "$f")
            # Rename with version
            newname="${filename%.apk}-${{ steps.version.outputs.VERSION }}.apk"
            cp "$f" "${{ github.workspace }}/apk/$newname"
            echo "Collected: $newname"
          done
          ls -la ${{ github.workspace }}/apk/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MobileBox-${{ steps.version.outputs.VERSION }}
          path: ${{ github.workspace }}/apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: MobileBox ${{ steps.version.outputs.VERSION }}
          body: |
            ## MobileBox ${{ steps.version.outputs.VERSION }}

            📱 **安卓手机版 TVBox** — 白色现代界面

            ### 下载说明
            - `arm64-v8a` — 适用于大多数现代安卓手机（64位）
            - `armeabi-v7a` — 适用于旧款或32位设备

            ### 更新说明
            ${{ github.event.inputs.release_note || github.event.head_commit.message }}

            ### 使用方法
            1. 下载对应架构的 APK
            2. 安装后进入「我的」→「订阅接口」配置内容源
            3. 进入「我的」→「直播订阅」配置直播源（M3U/TXT）
          files: ${{ github.workspace }}/apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
